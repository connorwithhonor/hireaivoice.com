<style>
:root{ --bg:#05070d; --panel:#0b1020; --cyan:#39c2ff; --gold:#c9a227; --text:#e6ecf7; --muted:rgba(230,236,247,.55); }
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
